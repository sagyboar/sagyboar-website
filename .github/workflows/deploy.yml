name: Build and Deploy

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  WEBSITE_IMAGE: ghcr.io/Sagyboar/Sagyboar-website/website

permissions:
  contents: read
  packages: write

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push website image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.website
          push: true
          tags: |
            ${{ env.WEBSITE_IMAGE }}:latest
            ${{ env.WEBSITE_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64

  deploy:
    needs: [build-website]
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GCP server
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          WEBSITE_IMAGE: ${{ env.WEBSITE_IMAGE }}:latest
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        with:
          host: ${{ secrets.GCP_SSH_HOST }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,WEBSITE_IMAGE,MONGODB_URI,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,ADMIN_EMAIL
          script: |
            set -euo pipefail

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Persist uploaded resumes outside the container so they survive
            # redeploys. The image runs as uid 1001 (nextjs), so the host dir
            # must be owned by that uid to be writable.
            RESUME_HOST_DIR=/opt/sagyboar/uploads/resumes
            mkdir -p "${RESUME_HOST_DIR}"
            chown -R 1001:1001 "${RESUME_HOST_DIR}" 2>/dev/null || sudo chown -R 1001:1001 "${RESUME_HOST_DIR}"

            # Pull, replace, and start the website container on localhost:8002.
            # Runtime secrets are read from the environment forwarded over SSH
            # (sourced from the "Production" GitHub Environment secrets).
            docker pull "${WEBSITE_IMAGE}"
            docker stop Sagyboar-website 2>/dev/null || true
            docker rm Sagyboar-website 2>/dev/null || true
            docker run -d \
              --name Sagyboar-website \
              --restart unless-stopped \
              -p "127.0.0.1:8002:8002" \
              -v "${RESUME_HOST_DIR}:/app/uploads/resumes" \
              -e "PORT=8002" \
              -e "HOSTNAME=0.0.0.0" \
              -e "RESUME_UPLOAD_DIR=/app/uploads/resumes" \
              -e "MONGODB_URI=${MONGODB_URI}" \
              -e "SMTP_HOST=${SMTP_HOST}" \
              -e "SMTP_PORT=${SMTP_PORT}" \
              -e "SMTP_USER=${SMTP_USER}" \
              -e "SMTP_PASS=${SMTP_PASS}" \
              -e "SMTP_FROM=${SMTP_FROM}" \
              -e "ADMIN_EMAIL=${ADMIN_EMAIL}" \
              "${WEBSITE_IMAGE}"

            docker image prune -af --filter "until=24h" || true
            docker logout ghcr.io || true
