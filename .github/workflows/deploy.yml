name: Build and Deploy

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  WEBSITE_IMAGE: ghcr.io/Sagyboar/Sagyboar-website/website

permissions:
  contents: read
  packages: write

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push website image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.website
          push: true
          tags: |
            ${{ env.WEBSITE_IMAGE }}:latest
            ${{ env.WEBSITE_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64

  deploy:
    needs: [build-website]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GCP server
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          WEBSITE_IMAGE: ${{ env.WEBSITE_IMAGE }}:latest
        with:
          host: ${{ secrets.GCP_SSH_HOST }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,WEBSITE_IMAGE
          script: |
            set -euo pipefail

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull, replace, and start the website container on localhost:8002.
            bash -s "${WEBSITE_IMAGE}" Sagyboar-website 8002 <<'DEPLOY'
            set -euo pipefail
            IMAGE="${1:?image required}"
            CONTAINER="${2:?container name required}"
            PORT="${3:?port required}"

            docker pull "${IMAGE}"
            docker stop "${CONTAINER}" 2>/dev/null || true
            docker rm "${CONTAINER}" 2>/dev/null || true
            docker run -d \
              --name "${CONTAINER}" \
              --restart unless-stopped \
              -p "127.0.0.1:${PORT}:${PORT}" \
              -e "PORT=${PORT}" \
              -e "HOSTNAME=0.0.0.0" \
              "${IMAGE}"
            DEPLOY

            docker image prune -af --filter "until=24h" || true
            docker logout ghcr.io || true
