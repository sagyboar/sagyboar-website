name: Build and Deploy

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  WEBSITE_IMAGE: ghcr.io/sagyboar/sagyboar-website/website

permissions:
  contents: read
  packages: write

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push website image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.website
          push: true
          tags: |
            ${{ env.WEBSITE_IMAGE }}:latest
            ${{ env.WEBSITE_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64

  deploy:
    needs: [build-website]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          required="GHCR_TOKEN VM_HOST VM_USER VM_SSH_KEY"
          missing=""
          for var in ${required}; do
            if [ -z "${!var:-}" ]; then
              missing="${missing} ${var}"
            fi
          done
          if [ -n "${missing}" ]; then
            echo "::error::Missing required secrets/variables:${missing}"
            echo "Set them in the 'Production' GitHub Environment before deploying."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Deploy to GCP server
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          WEBSITE_IMAGE: ${{ env.WEBSITE_IMAGE }}:latest
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GHCR_TOKEN,WEBSITE_IMAGE
          script: |
            set -euo pipefail

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Persist uploaded resumes outside the container so they survive
            # redeploys. The image runs as uid 1001 (nextjs), so the host dir
            # must be owned by that uid to be writable.
            RESUME_HOST_DIR=/opt/sagyboar/uploads/resumes
            mkdir -p "${RESUME_HOST_DIR}"
            chown -R 1001:1001 "${RESUME_HOST_DIR}" 2>/dev/null || sudo chown -R 1001:1001 "${RESUME_HOST_DIR}"

            # Runtime secrets are read from /opt/sagyboar-website/.env, which is
            # managed manually on the server (via env_file in the compose file).
            cd /opt/sagyboar-website
            if [ ! -f .env ]; then
              echo "::error::/opt/sagyboar-website/.env is missing. Create it on the server before deploying."
              exit 1
            fi

            # Pull the new image, replace the running container, and start via compose.
            docker pull "${WEBSITE_IMAGE}"
            docker stop sagyboar-website 2>/dev/null || true
            docker rm sagyboar-website 2>/dev/null || true
            docker compose up -d

            docker image prune -af --filter "until=24h" || true
            docker logout ghcr.io || true
