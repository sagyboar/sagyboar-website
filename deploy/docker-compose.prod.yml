services:
  marketing-site:
    image: ghcr.io/sagyboar/sagyboar-website/website:latest
    container_name: sagyboar-website
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8002"
    env_file:
      - .env
    environment:
      - PORT=8002
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - RESUME_UPLOAD_DIR=/app/uploads/resumes
    volumes:
      - /opt/sagyboar/uploads/resumes:/app/uploads/resumes
    networks:
      - sagyboar-cloud_default

networks:
  sagyboar-cloud_default:
    external: true
